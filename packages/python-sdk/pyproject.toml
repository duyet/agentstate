[project]
name = "agentstate"
version = "0.1.1"
description = "AgentState API client for Python"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "respx>=0.23.1",
]
langgraph = [
    "langgraph>=1.2.5",
    "langgraph-checkpoint>=2.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

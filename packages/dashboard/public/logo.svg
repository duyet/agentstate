<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square base -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="currentColor"/>

  <!-- State/conversation lines - representing stored conversation turns -->
  <g stroke="white" stroke-width="1.8" stroke-linecap="round">
    <!-- Three conversation lines, staggered like a chat history -->
    <line x1="9" y1="11" x2="19" y2="11"/>
    <line x1="13" y1="16" x2="23" y2="16"/>
    <line x1="9" y1="21" x2="17" y2="21"/>
  </g>

  <!-- Small dot - active state indicator -->
  <circle cx="23" cy="21" r="2" fill="#22c55e"/>
</svg>

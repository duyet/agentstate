name: Release

on:
  # Tagging + release creation is owned by release-please (release-please.yml).
  # We fire on the published release it cuts. workflow_dispatch stays for manual builds.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read
  pull-requests: read

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  release-notes:
    name: release-notes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      # Centralized release notes: tiered AI summary (Copilot → GitHub Models →
      # AnyRouter), recap stats, compare link, and the migration prompt — all
      # from duyet/llm-release-action, which also publishes the Release body.
      - name: Generate & publish release notes
        uses: duyet/llm-release-action@v1
        with:
          release-tag: ${{ env.RELEASE_TAG }}
          project-name: AgentState
          notes-prompt-file: .github/release-notes-prompt.md
          system-prompt-file: .github/release-notes-system-prompt.md
          migration-prompt-file: .github/release-migration-prompt.md
          anyrouter-source: agentstate
          anyrouter-title: AgentState
          anyrouter-api-key: ${{ secrets.ANYROUTER_API_KEY }}
          anyrouter-model: ${{ vars.ANYROUTER_MODEL || 'openai/gpt-4o-mini' }}

  artifacts:
    name: artifacts
    needs: release-notes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        continue-on-error: true
        run: bun install

      - name: Build
        continue-on-error: true
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
        run: bun run build

      - name: Package artifacts
        run: |
          mkdir -p out
          for d in packages/dashboard/out packages/dashboard/.next packages/api/dist; do
            if [ -d "$d" ]; then
              tar -czf "out/agentstate-${RELEASE_TAG}-$(echo "$d" | tr '/' '-').tar.gz" "$d"
            fi
          done
          git archive --format=tar.gz -o "out/agentstate-${RELEASE_TAG}-source.tar.gz" HEAD
          ( cd out && shasum -a 256 *.tar.gz > SHA256SUMS )

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" out/* --clobber

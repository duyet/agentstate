name: Dashboard Preview Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/dashboard/**'
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  NODE_VERSION: '22.x'

jobs:
  dashboard-preview:
    if: github.event_name == 'pull_request' || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build dashboard
        run: cd packages/dashboard && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/dashboard
          command: pages deploy out --project-name=agentstate-dashboard --branch=${{ github.head_ref || github.ref_name }}
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_ENDPOINT: https://agentstate.app/api

      - name: Generate deployment preview URL
        id: preview
        if: github.event_name == 'pull_request'
        run: |
          # This will be updated by Cloudflare Pages action output
          # Preview URL format: https://agentstate-dashboard-<commit-hash>.<account>.pages.dev
          echo "preview_url=https://agentstate-dashboard-${GITHUB_SHA::7}-${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.pages.dev" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Dashboard Ready for Preview

              Your dashboard build is deployed and ready to test!

              **Preview URL**: ${process.env.PREVIEW_URL}

              > This preview URL will be available for all reviewers. Let us know if you encounter any issues!`
            })
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}

      - name: Delete previous preview deployments
        if: github.event_name == 'pull_request'
        uses: johnbryant/actions-cloudflare-pages@v2
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          project: agentstate-dashboard
          branch: ${{ github.head_ref }}
          keep_last: 1

name: Dashboard Preview Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/dashboard/**'
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  NODE_VERSION: '22.x'

jobs:
  dashboard-preview:
    if: github.event_name == 'pull_request' || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build dashboard
        run: cd packages/dashboard && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: packages/dashboard
          command: pages deploy out --project-name=agentstate-dashboard --branch=${{ github.head_ref || github.ref_name }}
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_ENDPOINT: https://agentstate.app/api

      - name: Generate deployment preview URL
        id: preview
        if: github.event_name == 'pull_request'
        run: |
          # This will be updated by Cloudflare Pages action output
          # Preview URL format: https://agentstate-dashboard-<commit-hash>.<account>.pages.dev
          echo "preview_url=https://agentstate-dashboard-${GITHUB_SHA::7}-${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.pages.dev" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Dashboard Ready for Preview

              Your dashboard build is deployed and ready to test!

              **Preview URL**: ${process.env.PREVIEW_URL}

              > This preview URL will be available for all reviewers. Let us know if you encounter any issues!`
            })
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}

      - name: Delete previous preview deployments
        if: github.event_name == 'pull_request'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: agentstate-dashboard
          CF_PAGES_BRANCH: ${{ github.head_ref }}
          KEEP_LAST: '1'
        run: |
          set +e
          : "${CF_API_TOKEN:?CLOUDFLARE_API_TOKEN secret is required}"
          : "${CF_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID secret is required}"
          : "${CF_PAGES_PROJECT:?project is required}"
          : "${CF_PAGES_BRANCH:?branch is required}"

          api="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}/deployments?per_page=100"

          # Keep only the most recent KEEP_LAST preview deployments for this branch;
          # never touch production deployments. Best-effort: a failed delete on one
          # deployment does not abort pruning of the rest.
          curl -fsSL -H "Authorization: Bearer ${CF_API_TOKEN}" "$api" \
            | jq -r --arg branch "$CF_PAGES_BRANCH" '
                .result // []
                | map(select(
                    (.environment // "") == "preview"
                    and ((.deployment_trigger.metadata.branch // .branch // "") == $branch)
                  ))
                | sort_by(.created_on) | reverse
                | .[($ENV.KEEP_LAST | tonumber):]
                | .[].id' \
            | while read -r dep_id; do
                echo "Deleting stale preview deployment ${dep_id}"
                curl -fsSL -X DELETE \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  "${api%/deployments*}/deployments/${dep_id}" \
                  | jq -r '.success // false | "  -> " + (if . then "ok" else "failed" end)'
              done

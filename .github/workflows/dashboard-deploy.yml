name: Dashboard Production Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/dashboard/**'
      - '.github/workflows/dashboard-deploy.yml'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: bun install

      - name: Build dashboard
        run: cd packages/dashboard && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDir: packages/dashboard
          command: pages deploy out --project-name=agentstate-production
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_ENDPOINT: https://agentstate.app/api

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always() && env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ job.status }}

name: Dashboard Production Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/dashboard/**'
      - '.github/workflows/dashboard-deploy.yml'

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd packages/dashboard
          pnpm install

      - name: Build dashboard
        run: |
          cd packages/dashboard
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDir: packages/dashboard
          command: pages deploy out --project-name=agentstate-production
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_ENDPOINT: https://agentstate.app/api

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api:
    name: API (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install && npm install @rollup/rollup-linux-x64-gnu

      - name: Lint
        run: bunx biome check packages/api/src/

      - name: Type check
        run: npx tsc --noEmit -p packages/api/tsconfig.json

      - name: Test
        run: cd packages/api && npx vitest run

  dashboard:
    name: Dashboard (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd packages/dashboard && bun install

      - name: Build
        run: cd packages/dashboard && bun run build

  deploy:
    name: Deploy
    needs: [api, dashboard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install API dependencies
        run: npm install

      - name: Apply migrations
        run: npx wrangler d1 migrations apply agentstate-db --remote
        working-directory: packages/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API Worker
        run: npx wrangler deploy
        working-directory: packages/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install Dashboard dependencies
        run: cd packages/dashboard && bun install

      - name: Build Dashboard
        run: cd packages/dashboard && bun run build

      - name: Deploy Dashboard to Pages
        run: npx wrangler pages deploy packages/dashboard/out --project-name agentstate --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
